# Railway deployment configuration for SyncKar
# https://docs.railway.app/reference/config-as-code
#
# Services (Railway free plan — 4 max):
#   1. SyncKar-AI4BHARAT  — main API + embedded Celery worker + beat
#   2. mock-systems        — all three mock dept systems on one service
#   3. Postgres            — managed plugin
#   4. Redis               — managed plugin
#
# External Kafka: Aiven or Upstash free tier.
# Set KAFKA_* env vars in Railway dashboard.

# ── Main API service (SyncKar-AI4BHARAT) ─────────────────────────────────
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash -c 'uvicorn synckar.api.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Combined mock systems service ─────────────────────────────────────────
# In Railway dashboard → mock-systems service → Settings → Build:
#   Dockerfile Path: mock_systems/Dockerfile
#
# Railway reads the [services.*] block whose name matches the service name
# set in the dashboard.
[services.mock-systems.build]
builder = "DOCKERFILE"
dockerfilePath = "mock_systems/Dockerfile"

[services.mock-systems.deploy]
startCommand = "bash -c 'uvicorn mock_systems.combined_app:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
