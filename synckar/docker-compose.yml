version: "3.9"

services:
  # ─── Infrastructure ───
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: synckar-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    # No host ports needed — synckar-api connects via Docker internal network only
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - synckar

  postgres:
    image: postgres:16-alpine
    container_name: synckar-postgres
    environment:
      POSTGRES_USER: synckar_app
      POSTGRES_PASSWORD: synckar_app
      POSTGRES_DB: synckar
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synckar"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - synckar

  redis:
    image: redis:7-alpine
    container_name: synckar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - synckar

  # ─── Mock Systems (combined into one service) ───
  # All three mock department systems run in a single container.
  # Prefixes: /sws, /shop, /factories
  # Set MOCK_*_BASE_URL env vars in synckar-api to point here.
  mock-systems:
    build:
      context: .
      dockerfile: mock_systems/Dockerfile
    container_name: synckar-mock-systems
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - synckar

  # ─── SyncKar Core ───
  # API + embedded Celery worker + embedded Celery beat all in one process.
  # No separate celery-worker or celery-beat services needed.
  synckar-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synckar-api
    ports:
      - "18080:8080"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://synckar_app:synckar_app@postgres:5432/synckar
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT
      # Point adapters at the combined mock service
      - MOCK_SWS_BASE_URL=http://mock-systems:8000/sws
      - MOCK_SHOP_BASE_URL=http://mock-systems:8000/shop
      - MOCK_FACTORIES_BASE_URL=http://mock-systems:8000/factories
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-systems:
        condition: service_started
    networks:
      - synckar

volumes:
  redpanda_data:
  pg_data:
  redis_data:

networks:
  synckar:
    driver: bridge
