# Render Blueprint — deploy all SyncKar services
# https://render.com/docs/blueprint-spec
#
# External services needed (free tiers available):
#   - PostgreSQL: use Render's managed Postgres (add in dashboard)
#   - Redis:      use Render's managed Redis (add in dashboard)
#   - Kafka:      use Aiven (free tier) or Upstash Kafka
#
# After deploying, set these env vars in the Render dashboard:
#   DATABASE_URL, REDIS_URL, KAFKA_BOOTSTRAP_SERVERS,
#   KAFKA_SASL_USERNAME, KAFKA_SASL_PASSWORD, RSA_PRIVATE_KEY_BASE64,
#   CELERY_BROKER_URL (= REDIS_URL with /1), CELERY_RESULT_BACKEND (= REDIS_URL with /2)

services:
  # ─── Main SyncKar API (FastAPI + Kafka consumer + React dashboard) ───
  - type: web
    name: synckar-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_SASL_USERNAME
        sync: false
      - key: KAFKA_SASL_PASSWORD
        sync: false
      - key: KAFKA_SSL_CA_PATH
        value: /app/ca.pem
      - key: MOCK_SWS_BASE_URL
        value: https://synckar-mock-sws.onrender.com
      - key: MOCK_SHOP_BASE_URL
        value: https://synckar-mock-shop.onrender.com
      - key: MOCK_FACTORIES_BASE_URL
        value: https://synckar-mock-factories.onrender.com
      - key: RSA_PRIVATE_KEY_BASE64
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  # ─── Celery Worker (propagation tasks) ───
  - type: worker
    name: synckar-celery-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: celery -A synckar.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_SASL_USERNAME
        sync: false
      - key: KAFKA_SASL_PASSWORD
        sync: false
      - key: KAFKA_SSL_CA_PATH
        value: /app/ca.pem
      - key: MOCK_SWS_BASE_URL
        value: https://synckar-mock-sws.onrender.com
      - key: MOCK_SHOP_BASE_URL
        value: https://synckar-mock-shop.onrender.com
      - key: MOCK_FACTORIES_BASE_URL
        value: https://synckar-mock-factories.onrender.com
      - key: RSA_PRIVATE_KEY_BASE64
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  # ─── Celery Beat (polling + outbox drain scheduler) ───
  - type: worker
    name: synckar-celery-beat
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: celery -A synckar.workers.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_SASL_USERNAME
        sync: false
      - key: KAFKA_SASL_PASSWORD
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  # ─── Mock SWS ───
  - type: web
    name: synckar-mock-sws
    runtime: docker
    dockerfilePath: ./mock_systems/mock_sws/Dockerfile
    dockerContext: ./mock_systems/mock_sws
    envVars:
      - key: PORT
        value: "10000"

  # ─── Mock Shop Establishment ───
  - type: web
    name: synckar-mock-shop
    runtime: docker
    dockerfilePath: ./mock_systems/mock_dept_shop/Dockerfile
    dockerContext: ./mock_systems/mock_dept_shop
    envVars:
      - key: PORT
        value: "10000"

  # ─── Mock Factories ───
  - type: web
    name: synckar-mock-factories
    runtime: docker
    dockerfilePath: ./mock_systems/mock_dept_factories/Dockerfile
    dockerContext: ./mock_systems/mock_dept_factories
    envVars:
      - key: PORT
        value: "10000"
